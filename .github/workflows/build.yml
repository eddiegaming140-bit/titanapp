name: Build iOS App For Sideloading

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Guarded Workload Restore
        run: |
          PROJ=$(find . -name "*.csproj" -print -quit)
          echo "Found project at: $PROJ"
          DOTNET_PATH=$(which dotnet)
          echo "Targeting exact .NET binary: $DOTNET_PATH"
          sudo env "PATH=$PATH" "$DOTNET_PATH" workload restore "$PROJ" -p:TargetFramework=net8.0-ios --skip-manifest-update -p:CheckEolWorkloads=false

      - name: Build App Bundle
        run: |
          PROJ=$(find . -name "*.csproj" -print -quit)
          DOTNET_PATH=$(which dotnet)
          "$DOTNET_PATH" publish "$PROJ" -p:TargetFramework=net8.0-ios -c Release -p:EnableCodeSigning=false -p:CheckEolWorkloads=false

      - name: Convert to IPA Archive
        run: |
          mkdir Payload
          APP_PATH=$(find . -name "*.app" -path "*/bin/Release/*" -print -quit)
          echo "Found compiled app bundle at: $APP_PATH"
          cp -r "$APP_PATH" ./Payload/
          zip -r MyMapApp.ipa Payload

      - name: Save IPA File
        uses: actions/upload-artifact@v4
        with:
          name: ready-to-sideload
          path: MyMapApp.ipa
